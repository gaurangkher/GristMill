name: Bug Report
description: Something isn't working
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: GristMill version
      description: Run `gristmill-daemon --version` or paste the git commit SHA
      placeholder: "v0.2.1 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - grist-sieve (triage)
        - grist-grinders (inference)
        - grist-ledger (memory)
        - grist-hammer (LLM escalation)
        - grist-millwright (pipelines)
        - grist-bus (pub/sub)
        - gristmill-daemon (IPC server)
        - gristmill-integrations (TypeScript shell)
        - gristmill-ml (Python training)
        - Dashboard / API
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start daemon with `cargo run -p gristmill-daemon`
        2. Send event: `curl -X POST ...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs (set `RUST_LOG=debug` for Rust, `DEBUG=*` for TypeScript)
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Node version, Python version
      placeholder: |
        OS: macOS 14.5 arm64
        Rust: 1.81.0
        Node: 20.15.0
        Python: 3.11.9
    validations:
      required: true
